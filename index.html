<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARTSLIVE Home - Premium Custom Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00adb5;
            --bg-translucent: rgba(255, 255, 255, 0.07); /* 右側エリアの透過座布団 */
            --panel-bg: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'Oswald', 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            background-image: url('bg.png'); /* あなたの用意する背景画像 */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 全体コンテナ（基本は横画面用の2カラム） */
        .main-container {
            display: flex;
            width: 95vw;
            max-width: 1280px;
            height: 85vh;
            max-height: 720px;
            gap: 30px;
            transition: all 0.3s ease;
        }

        /* 縦画面（スマホ縦持ち）の時は上下レイアウトに自動切替 */
        @media (orientation: portrait) {
            body {
                overflow-y: auto;
                padding: 80px 0 20px 0; /* ヘッダーボタンの余白確保 */
            }
            .main-container {
                flex-direction: column;
                height: auto;
                max-height: none;
                gap: 50px;
            }
            .left-column {
                gap: 20px;
            }
            .right-column {
                height: 500px; /* 縦画面時の右パネルの高さ固定 */
            }
            .huge-score {
                font-size: 8rem !important; /* 縦画面用に少し縮小 */
                margin: 20px 0 !important;
            }
        }

        /* 左カラム：スコア・ラウンド・履歴 */
        .left-column {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        /* 右カラム：スタッツ・アワード */
        .right-column {
            flex: 0.8;
            background: var(--bg-translucent);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        /* 上部ラウンド表示 */
        .round-badge {
            background: var(--panel-bg);
            border-radius: 50px;
            padding: 10px 40px;
            font-size: 2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            letter-spacing: 2px;
            align-self: flex-start;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .round-badge .infinity { font-size: 2.5rem; line-height: 0; }
        .round-badge .label { font-size: 1.2rem; color: #888; font-weight: 400; margin-left: 10px; }

        /* メイン巨大スコア */
        .huge-score {
            font-size: 11rem;
            font-weight: 700;
            line-height: 1;
            margin: auto 0;
            text-shadow: 0 0 30px rgba(0, 0, 0, 0.6), 0 10px 20px rgba(0,0,0,0.5);
            letter-spacing: -2px;
            text-align: left;
            padding-left: 10px;
        }

        /* 3本履歴カプセル */
        .history-capsule {
            background: var(--panel-bg);
            border-radius: 50px;
            padding: 15px 40px;
            display: flex;
            justify-content: flex-start;
            gap: 40px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #eee;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .history-capsule div { min-width: 80px; text-align: left; }
        .history-capsule .separator { color: #555; font-weight: 400; min-width: auto; }

        /* 右側タブシステム */
        .tab-header {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: absolute;
            top: -45px;
            right: 0;
        }
        .tab-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #888;
            padding: 8px 25px;
            font-size: 1.1rem;
            font-family: inherit;
            border-radius: 12px 12px 0 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--bg-translucent);
            backdrop-filter: blur(10px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: none;
        }

        .tab-content {
            display: none;
            flex-direction: column;
            height: 100%;
            justify-content: center;
        }
        .tab-content.active { display: flex; }

        /* ブル率表示エリア */
        .bull-rate-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 20px;
        }
        
        /* SVG円形ゲージ */
        .circle-gauge { transform: rotate(-90deg); }
        .circle-bg { stroke: rgba(255,255,255,0.05); }
        .circle-progress {
            stroke: url(#gauge-gradient);
            stroke-dasharray: 565.48;
            stroke-dashoffset: 565.48;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease;
        }

        /* ゲージ中央のテキスト */
        .gauge-text { position: absolute; text-align: center; }
        .gauge-text .label { font-size: 1rem; color: #888; letter-spacing: 2px; }
        .gauge-text .percent { font-size: 4.5rem; font-weight: 700; line-height: 1.1; }
        .gauge-text .percent span { font-size: 2rem; font-weight: 400; }

        /* 左側のレベルメーター風装飾 */
        .level-meter-deco {
            position: absolute;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 3px;
            transform: rotate(180deg);
        }
        .level-bar { width: 15px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 1px; }

        /* BULL COUNT表示 */
        .bull-count-box { text-align: center; margin-top: auto; }
        .bull-count-box .label { font-size: 1.3rem; letter-spacing: 4px; color: #ccc; margin-bottom: 5px; }
        .bull-count-box .count { font-size: 5.5rem; font-weight: 700; line-height: 1; }

        /* アワード数表示エリア */
        .award-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            row-gap: 25px;
            column-gap: 20px;
            padding: 10px 0;
        }
        .award-item { text-align: center; }
        .award-item .label { font-size: 0.95rem; color: #aaa; letter-spacing: 1px; margin-bottom: 2px; font-weight: 400; }
        .award-item .count { font-size: 2.8rem; font-weight: 700; color: #fff; line-height: 1; }

        /* 接続ボタン＆ログ */
        .header-controls { position: absolute; top: 15px; left: 20px; display: flex; align-items: center; gap: 15px; z-index: 10; }
        .btn-connect {
            background: #00adb5; border: none; color: white; padding: 8px 20px;
            font-family: inherit; font-size: 1rem; font-weight: 700; border-radius: 20px; cursor: pointer;
        }
        .dev-log { color: #555; font-size: 0.8rem; font-family: monospace; }

        /* 全画面ビデオオーバーレイ */
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 9999; }
        #awardVideo { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="header-controls">
        <button class="btn-connect" id="connectBtn">CONNECT BOARD</button>
        <div class="dev-log" id="logConsole">BOARD READY.</div>
    </div>

    <div class="main-container">
        
        <div class="left-column">
            <div class="round-badge">
                <span id="currentRoundNum">1</span> <span style="color:#555;">/</span> <span class="infinity">∞</span> <span class="label">ROUND</span>
            </div>

            <div class="huge-score" id="totalScore">0</div>

            <div class="history-capsule">
                <div id="slot0">---</div>
                <div class="separator">|</div>
                <div id="slot1">---</div>
                <div class="separator">|</div>
                <div id="slot2">---</div>
            </div>
        </div>

        <div class="right-column">
            <div class="tab-header">
                <button class="tab-btn active" id="btnTabBull">ブル率</button>
                <button class="tab-btn" id="btnTabAward">アワード数</button>
            </div>

            <div class="tab-content active" id="contentBull">
                <div class="bull-rate-container">
                    <div class="level-meter-deco" id="levelMeter"></div>
                    <svg class="circle-gauge" width="220" height="220" viewBox="0 0 200 200">
                        <defs>
                            <linearGradient id="gauge-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#0052d4" />
                                <stop offset="50%" stop-color="#4364f7" />
                                <stop offset="100%" stop-color="#6fb1fc" />
                            </linearGradient>
                        </defs>
                        <circle class="circle-bg" cx="100" cy="100" r="90" stroke-width="10" fill="none"/>
                        <circle class="circle-progress" id="gaugeCircle" cx="100" cy="100" r="90" stroke-width="10" fill="none"/>
                    </svg>
                    <div class="gauge-text">
                        <div class="label">BULL RATE</div>
                        <div class="percent" id="bullRate">0<span>.00%</span></div>
                    </div>
                </div>
                <div class="bull-count-box">
                    <div class="label">BULL COUNT</div>
                    <div class="count" id="bullCount">0</div>
                </div>
            </div>

            <div class="tab-content" id="contentAward">
                <div class="award-grid">
                    <div class="award-item"><div class="label">ONE BULL</div><div class="count" id="cnt_onebull">0</div></div>
                    <div class="award-item"><div class="label">LOW TON</div><div class="count" id="cnt_lowton">0</div></div>
                    <div class="award-item"><div class="label">HAT TRICK</div><div class="count" id="cnt_hattrick">0</div></div>
                    <div class="award-item"><div class="label">HIGH TON</div><div class="count" id="cnt_highton">0</div></div>
                    <div class="award-item"><div class="label">TON 80</div><div class="count" id="cnt_ton80">0</div></div>
                    <div class="award-item"><div class="label">WHITE HORSE</div><div class="count" id="cnt_whitehorse">0</div></div>
                    <div class="award-item"><div class="label">THREE IN A BED</div><div class="count" id="cnt_bed">0</div></div>
                    <div class="award-item"><div class="label">THREE IN THE BLACK</div><div class="count" id="cnt_black">0</div></div>
                </div>
            </div>

        </div>
    </div>

    <div id="videoOverlay">
        <video id="awardVideo" src="" preload="auto" playsinline webkit-playsinline></video>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        
        let totalScore = 0;
        let totalDartsCount = 0;
        let totalBullCount = 0;
        let roundHits = []; 
        let isVideoPlaying = false;
        let hasRoundBull = false; 

        const awardCounts = { onebull: 0, lowton: 0, highton: 0, ton80: 0, hattrick: 0, bed: 0, whitehorse: 0, black: 0 };
        const awardVideos = {
            onebull: 'videos/onebull.mp4', lowton: 'videos/lowton.mp4', highton: 'videos/highton.mp4', ton80: 'videos/ton80.mp4',
            hattrick: 'videos/hattrick.mp4', bed: 'videos/three-in-a-bed.mp4', whitehorse: 'videos/white-horse.mp4', black: 'videos/three-in-the-black.mp4'
        };

        // レベルメーター装飾の生成
        const levelMeter = document.getElementById('levelMeter');
        for(let i=0; i<16; i++) {
            const bar = document.createElement('div');
            bar.className = 'level-bar';
            levelMeter.appendChild(bar);
        }

        // タブ切り替え
        const btnTabBull = document.getElementById('btnTabBull');
        const btnTabAward = document.getElementById('btnTabAward');
        const contentBull = document.getElementById('contentBull');
        const contentAward = document.getElementById('contentAward');

        btnTabBull.addEventListener('click', () => {
            playSound('poti');
            btnTabBull.classList.add('active'); btnTabAward.classList.remove('active');
            contentBull.classList.add('active'); contentAward.classList.remove('active');
        });
        btnTabAward.addEventListener('click', () => {
            playSound('poti');
            btnTabAward.classList.add('active'); btnTabBull.classList.remove('active');
            contentAward.classList.add('active'); contentBull.classList.remove('active');
        });

        // ゲージ＆メーター更新
        function updateBullRateUI(rate) {
            const circle = document.getElementById('gaugeCircle');
            const circumference = 565.48;
            const offset = circumference - (rate / 100) * circumference;
            circle.style.strokeDashoffset = offset;

            const intPart = Math.floor(rate);
            const decPart = (rate - intPart).toFixed(2).substring(1);
            document.getElementById('bullRate').innerHTML = `${intPart}<span>${decPart}</span>`;

            const bars = document.querySelectorAll('.level-bar');
            const activeBarsCount = Math.ceil((rate / 100) * bars.length);
            bars.forEach((bar, idx) => {
                if(idx < activeBarsCount) {
                    bar.style.background = 'linear-gradient(90deg, #00adb5, #6fb1fc)';
                    bar.style.boxShadow = '0 0 8px #00adb5';
                } else {
                    bar.style.background = 'rgba(255,255,255,0.1)';
                    bar.style.boxShadow = 'none';
                }
            });
        }

        function calculateScore(id) {
            if (id >= 1 && id <= 20)  return { score: id, label: `S${id}`, type: 'single', num: id };
            if (id >= 21 && id <= 40) return { score: id - 20, label: `S${id - 20}`, type: 'single', num: id - 20 };
            if (id >= 41 && id <= 60) return { score: (id - 40) * 2, label: `D${id - 40}`, type: 'double', num: id - 40 };
            if (id >= 61 && id <= 80) return { score: (id - 60) * 3, label: `T${id - 60}`, type: 'triple', num: id - 60 };
            if (id === 81) return { score: 50, label: 'BULL', type: 'bull', num: 25 };
            if (id === 82) return { score: 50, label: 'D-BULL', type: 'inbull', num: 25 };
            return { score: 0, label: 'MISSED', type: 'unknown', num: 0 };
        }

        function playSound(type) {
            let path = '';
            if (type === 'single') path = 'sounds/single.mp3';
            if (type === 'double') path = 'sounds/double.mp3';
            if (type === 'triple') path = 'sounds/triple.mp3';
            if (type === 'bull') path = 'sounds/bull.mp3';
            if (type === 'inbull') path = 'sounds/inner-bull.mp3';
            if (type === 'round-change') path = 'sounds/round-change.mp3';
            if (type === 'poti') path = 'sounds/poti.mp3';

            if (path) { new Audio(path).play().catch(e => console.log(e)); }
        }

        function playAwardVideo(awardKey) {
            const overlay = document.getElementById('videoOverlay');
            const video = document.getElementById('awardVideo');
            const path = awardVideos[awardKey];

            if (!path) return;

            awardCounts[awardKey]++;
            document.getElementById(`cnt_${awardKey}`).innerText = awardCounts[awardKey];

            video.src = path; overlay.style.display = 'block'; isVideoPlaying = true;
            video.currentTime = 0; video.play().catch(e => console.log(e));
            video.onended = () => { closeAwardVideo(); };
        }

        function closeAwardVideo() {
            const overlay = document.getElementById('videoOverlay');
            const video = document.getElementById('awardVideo');
            video.pause(); overlay.style.display = 'none'; video.src = ''; isVideoPlaying = false;
        }

        function checkRoundAward(hits) {
            const isAllInBull = hits.every(h => h.type === 'inbull');
            const isAllBull = hits.every(h => h.type === 'bull' || h.type === 'inbull');
            const isAllTriple = hits.every(h => h.type === 'triple');
            const isAllDouble = hits.every(h => h.type === 'double');

            if (isAllInBull) return 'black';
            if (isAllBull) return 'hattrick';
            if (hits.every(h => h.type === 'triple' && h.num === 20)) return 'ton80';
            if (isAllTriple && (new Set(hits.map(h => h.num)).size === 3)) return 'whitehorse';
            if ((isAllTriple || isAllDouble) && (new Set(hits.map(h => h.num)).size === 1)) return 'bed';

            const roundTotal = hits.reduce((sum, h) => sum + h.score, 0);
            if (roundTotal >= 150 && roundTotal <= 179) return 'highton';
            if (roundTotal >= 100 && roundTotal <= 149) return 'lowton';
            return null;
        }

        // Bluetooth接続（動画アンロック付き）
        document.getElementById('connectBtn').addEventListener('click', async () => {
            playSound('poti');
            
            const video = document.getElementById('awardVideo');
            video.play().then(() => {
                video.pause();
                video.currentTime = 0;
            }).catch(e => console.log("Video active deferred:", e));

            addLog("SEARCHING BOARD...");
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'DARTSLIVE HOME' }],
                    optionalServices: [SERVICE_UUID]
                });
                addLog("CONNECTING...");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristics = await service.getCharacteristics();
                
                let targetCharacteristic = null;
                for (const c of characteristics) {
                    if (c.properties.notify) { targetCharacteristic = c; break; }
                }
                if (!targetCharacteristic) throw new Error("NO NOTIFY CHARACTERISTIC");

                await targetCharacteristic.startNotifications();
                targetCharacteristic.addEventListener('characteristicvaluechanged', handleDataChanged);
                addLog("CONNECTED.");
                document.getElementById('connectBtn').style.display = 'none';
            } catch (error) {
                addLog(`ERROR: ${error.message}`);
            }
        });

        function handleDataChanged(event) {
            const data = event.target.value;
            if (data.byteLength >= 3 && data.getUint8(0) === 0xA1 && data.getUint8(1) === 0x03) {
                if (isVideoPlaying) { closeAwardVideo(); }

                if (roundHits.length === 3) {
                    roundHits = []; hasRoundBull = false;
                    document.getElementById('slot0').innerText = '---';
                    document.getElementById('slot1').innerText = '---';
                    document.getElementById('slot2').innerText = '---';
                }

                const segmentId = data.getUint8(2);
                const result = calculateScore(segmentId);

                if (result.score >= 0) {
                    totalScore += result.score;
                    totalDartsCount++;
                    const isBullHit = (result.type === 'bull' || result.type === 'inbull');
                    if (isBullHit) totalBullCount++;

                    roundHits.push(result);
                    const currentSlotIndex = roundHits.length - 1;

                    document.getElementById('totalScore').innerText = totalScore;
                    document.getElementById('bullCount').innerText = totalBullCount;
                    document.getElementById(`slot${currentSlotIndex}`).innerText = result.label;
                    document.getElementById('currentRoundNum').innerText = Math.ceil(totalDartsCount / 3);

                    const currentRate = (totalBullCount / totalDartsCount) * 100;
                    updateBullRateUI(currentRate);

                    playSound(result.type);

                    if (isBullHit && !hasRoundBull && roundHits.length < 3) {
                        hasRoundBull = true;
                        setTimeout(() => { if (!isVideoPlaying) playAwardVideo('onebull'); }, 400); 
                    }

                    if (roundHits.length === 3) {
                        const award = checkRoundAward(roundHits);
                        setTimeout(() => {
                            if (award) { playAwardVideo(award); } else { playSound('round-change'); }
                        }, 600); 
                    }
                }
            }
        }

        function addLog(text) { document.getElementById('logConsole').innerText = text; }
    </script>
</body>
</html>
