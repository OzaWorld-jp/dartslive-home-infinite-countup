<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARTSLIVE Home - Vertical Premium Interface</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00adb5;
            --bg-translucent: rgba(255, 255, 255, 0.12); /* カンプの美しい透過 */
            --panel-bg: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Oswald', 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 1080*1920 固定の縦型仮想キャンバス（9:16の配信画面・OBSに完全シンクロ） */
        #app-scaler {
            width: 1080px;
            height: 1920px;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            position: absolute;
            transform-origin: center center;
            box-sizing: border-box;
            padding: 40px 40px; /* パディング込で1920pxに完全パッキング */
            gap: 30px; /* 強制自動縮小バグを完全粉砕する固定ギャップ */
        }

        /* 最上部：テキスト流し用透過150pxスペース */
        .ticker-space {
            width: 100%;
            height: 150px;
            background: transparent;
            flex-shrink: 0;
        }

        /* ラウンド数 ＆ タイマーの並列行 */
        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 70px;
            flex-shrink: 0;
        }

        .round-badge {
            background: var(--panel-bg);
            border-radius: 100px;
            padding: 10px 50px;
            font-size: 3rem;
            font-weight: 700;
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .round-badge .infinity { font-size: 4rem; line-height: 0; }
        .round-badge .label { font-size: 1.8rem; color: #aaa; margin-left: 5px; font-family: 'Oswald', sans-serif; }

        .top-timer {
            background: var(--panel-bg);
            border-radius: 100px;
            padding: 10px 50px;
            font-size: 3rem;
            font-weight: 400;
            font-family: 'Oswald', sans-serif;
            font-variant-numeric: tabular-nums; /* タイマーのガタつきを完全防御 */
            letter-spacing: 2px;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* スコア表示パネル（完全透明デザイン） */
        .score-panel {
            background: transparent;
            border: none;
            box-shadow: none;
            width: 100%;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            overflow: hidden;
        }

        .huge-score {
            font-size: 16rem; 
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 900;
            line-height: 1;
            text-shadow: 0 15px 40px rgba(0, 0, 0, 0.85);
            letter-spacing: -2px;
        }

        /* 3本ヒット履歴カプセル */
        .history-row {
            display: flex;
            justify-content: center;
            width: 100%;
            height: 100px;
            flex-shrink: 0;
        }

        .history-capsule {
            background: var(--panel-bg);
            border-radius: 100px;
            padding: 20px 60px;
            display: flex;
            gap: 40px;
            font-size: 3rem;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 700;
            color: #eee;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .history-capsule div { min-width: 130px; text-align: center; }
        .history-capsule .separator { color: #444; font-weight: 400; min-width: auto; font-family: 'Oswald', sans-serif; }

        /* 上段最大拡張スタッツコンテナ（ブル率とアワードの並列行：高さ640px） */
        .bottom-stats-container {
            display: flex;
            width: 100%;
            gap: 30px;
            height: 640px;
            flex-shrink: 0;
        }

        /* 左パネル：ブル率＆カウント詳細（幅440px） */
        .left-stats-panel {
            width: 440px;
            background: var(--bg-translucent);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 45px 10px; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .bull-rate-container {
            position: relative;
            width: 400px;
            height: 340px;
        }

        /* 🎯【サークル上シフト】topを0pxに引き上げ、BULL COUNTとの隙間を美しく拡張！ */
        .gauge-track-css {
            position: absolute;
            top: 0px; 
            left: 60px;
            width: 280px;
            height: 280px;
            border: 16px solid rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            box-sizing: border-box;
        }
        .gauge-progress-css {
            position: absolute;
            top: 0px; 
            left: 60px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: transparent;
            box-sizing: border-box;
            -webkit-mask: radial-gradient(transparent 123px, #000 124px);
            mask: radial-gradient(transparent 123px, #000 124px);
        }

        .gauge-dot {
            position: absolute;
            width: 24px;
            height: 24px;
            background: #ffffff;
            border: 5px solid #0044ff;
            border-radius: 50%;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(255,255,255,0.8);
            display: none;
            z-index: 100;
            transform: translate(-12px, -12px);
            pointer-events: none;
        }

        /* 🎯【文字盤一芯同期】サークルの上シフトに伴い、固定中心軸を「top: 140px」へ完全追従 */
        .gauge-text {
            position: absolute;
            top: 140px; 
            left: 0;
            width: 100%;
            transform: translateY(-50%);
            text-align: center;
        }
        .gauge-text .label { font-size: 1.8rem; color: #aaa; letter-spacing: 3px; font-weight: 700; margin-bottom: 2px; }
        .gauge-text .percent { font-size: 6.5rem; font-family: 'Impact', sans-serif; font-weight: 700; line-height: 1; }
        .gauge-text .percent span { font-size: 2.8rem; font-weight: 400; }

        .bull-count-box { text-align: center; width: 100%; }
        .bull-count-box .label { font-size: 2rem; letter-spacing: 4px; color: #aaa; font-weight: 700; }
        .bull-count-box .count { font-size: 8.5rem; font-family: 'Impact', sans-serif; font-weight: 700; line-height: 1; margin-bottom: 5px; }

        /* 右パネル：アワードカウンター（幅510px） */
        .right-awards-panel {
            width: 510px;
            background: var(--bg-translucent);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 45px 15px; 
            box-sizing: border-box;
        }

        .award-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: repeat(4, 1fr);
            height: 100%;
            gap: 20px;
        }
        .award-item { text-align: center; display: flex; flex-direction: column; justify-content: center; }
        .award-item .label { font-size: 1.5rem; color: #999; letter-spacing: 1px; font-weight: 700; margin-bottom: 2px; }
        .award-item .count { font-size: 4.5rem; font-family: 'Impact', sans-serif; font-weight: 700; color: #fff; line-height: 1; }

        /* 下段ツインコンテナ：スコア履歴(左8行) ＆ カメラ用透過空間(右)（全高490px） */
        .middle-bottom-container {
            display: flex;
            width: 100%;
            gap: 30px;
            height: 490px;
            flex-shrink: 0;
        }

        /* 左側：スコア履歴（幅440pxにロックして縦のラインを完全統一） */
        /* 🎯【下振れドロップ修正】パディングを「top:15px / bottom:45px」にリパッキングして、スコア全体の重心をキュッと上へ引き上げ！ */
        .score-history-panel {
            width: 440px;
            background: var(--bg-translucent);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            height: 100%;
            padding: 15px 0 45px 0; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .score-grid {
            display: grid;
            grid-template-columns: 1fr; 
            grid-template-rows: repeat(8, 1fr); 
            height: 100%;
            box-sizing: border-box;
            font-size: 2.3rem;
            font-weight: 700;
        }
        
        .score-row {
            display: flex;
            justify-content: center;
            gap: 60px;
            align-items: center;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
        }
        .score-row:last-child {
            border-bottom: none;
        }
        .score-row .r-num { width: 100px; text-align: left; color: #777; font-weight: 400; font-family: inherit; }
        .score-row .r-val { width: 120px; text-align: right; font-family: 'Oswald', sans-serif; font-weight: 700; color: #fff; }

        /* 右側：アワードパネルの真下（幅510px）。完全な透過カメラマウントスペース */
        .camera-mount-space {
            width: 510px;
            background: transparent;
            border: none;
            height: 100%;
        }

        /* 接続ボタン＆ログ */
        .header-controls { position: absolute; top: 15px; left: 40px; display: flex; align-items: center; gap: 20px; z-index: 10000; }
        .btn-connect {
            background: #00adb5; border: none; color: white; padding: 10px 30px;
            font-family: inherit; font-size: 1.2rem; font-weight: 700; border-radius: 30px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,173,181,0.4);
        }
        .dev-log { color: #555; font-size: 1.1rem; font-family: monospace; }

        /* 全画面ビデオオーバーレイ */
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 99999; }
        #awardVideo { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

    <div class="header-controls">
        <button class="btn-connect" id="connectBtn">CONNECT BOARD</button>
        <div class="dev-log" id="logConsole">BOARD READY.</div>
    </div>

    <div id="app-scaler">
        
        <div class="ticker-space"></div>

        <div class="top-row">
            <div class="round-badge">
                <span id="currentRoundNum">1</span> <span style="color:#555;">/</span> <span class="infinity">∞</span> <span class="label">ROUND</span>
            </div>
            <div class="top-timer" id="gameTimer" style="display:none;">00:00:00</div>
        </div>

        <div class="score-panel">
            <div class="huge-score" id="totalScore">0</div>
        </div>

        <div class="history-row">
            <div class="history-capsule">
                <div id="slot0">---</div>
                <div class="separator">|</div>
                <div id="slot1">---</div>
                <div class="separator">|</div>
                <div id="slot2">---</div>
            </div>
        </div>

        <div class="bottom-stats-container">
            
            <div class="left-stats-panel">
                <div class="bull-rate-container">
                    <div class="gauge-track-css"></div>
                    <div class="gauge-progress-css" id="gaugeCircleCSS"></div>
                    <div class="gauge-dot" id="gaugeDot"></div>
                    <div class="gauge-text">
                        <div class="label">BULL RATE</div>
                        <div class="percent" id="bullRate">0<span>.00%</span></div>
                    </div>
                </div>
                <div class="bull-count-box">
                    <div class="label">BULL COUNT</div>
                    <div class="count" id="bullCount">0</div>
                    <div style="display: flex; justify-content: center; gap: 30px; font-size: 1.8rem; color: #aaa; font-weight: 700;">
                        <div>INNER: <span id="innerBullCount" style="color: #fff; font-family: 'Impact'; font-size: 2.4rem;">0</span></div>
                        <div>OUTER: <span id="outerBullCount" style="color: #fff; font-family: 'Impact'; font-size: 2.4rem;">0</span></div>
                    </div>
                </div>
            </div>

            <div class="right-awards-panel">
                <div class="award-grid">
                    <div class="award-item"><div class="label">ONE BULL</div><div class="count" id="cnt_onebull">0</div></div>
                    <div class="award-item"><div class="label">LOW TON</div><div class="count" id="cnt_lowton">0</div></div>
                    <div class="award-item"><div class="label">HAT TRICK</div><div class="count" id="cnt_hattrick">0</div></div>
                    <div class="award-item"><div class="label">HIGH TON</div><div class="count" id="cnt_highton">0</div></div>
                    <div class="award-item"><div class="label">TON 80</div><div class="count" id="cnt_ton80">0</div></div>
                    <div class="award-item"><div class="label">WHITE HORSE</div><div class="count" id="cnt_whitehorse">0</div></div>
                    <div class="award-item"><div class="label">THREE IN A BED</div><div class="count" id="cnt_bed">0</div></div>
                    <div class="award-item"><div class="label">THREE IN THE BLACK</div><div class="count" id="cnt_black">0</div></div>
                </div>
            </div>
        </div>

        <div class="middle-bottom-container">
            <div class="score-history-panel">
                <div class="score-grid" id="scoreGrid"></div>
            </div>
            
            <div class="camera-mount-space"></div>
        </div>
    </div>

    <div id="videoOverlay">
        <video id="awardVideo" preload="none" playsinline webkit-playsinline></video>
    </div>

    <div id="startOverlay">
        <div class="msg-main">TAP TO START</div>
        <div class="msg-sub">BOARD CONNECTED. TAP TO UNLOCK SYSTEM MEDIA.</div>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const awardKeys = ['onebull', 'lowton', 'highton', 'ton80', 'hattrick', 'bed', 'whitehorse', 'black'];
        
        let totalScore = 0;
        let totalDartsCount = 0;
        let totalBullCount = 0;
        let roundHits = []; 
        let isVideoPlaying = false;
        let currentPlayingVideo = null;

        let isRoundLock = false;    
        let timerInterval = null;   
        let totalSeconds = 0;       
        let roundScores = [];       

        let totalOuterBullCount = 0;
        let totalInnerBullCount = 0;

        let logTimeout = null;
        let headerTimeout = null;

        const awardCounts = { onebull: 0, lowton: 0, highton: 0, ton80: 0, hattrick: 0, bed: 0, whitehorse: 0, black: 0 };
        const awardVideos = {
            onebull: 'videos/onebull.mp4', lowton: 'videos/lowton.mp4', highton: 'videos/highton.mp4', ton80: 'videos/ton80.mp4',
            hattrick: 'videos/hattrick.mp4', bed: 'videos/three-in-a-bed.mp4', whitehorse: 'videos/white-horse.mp4', black: 'videos/three-in-the-black.mp4'
        };

        function resizeApp() {
            const scaler = document.getElementById('app-scaler');
            const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
            scaler.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeApp);
        window.addEventListener('DOMContentLoaded', resizeApp);

        // 履歴の8行制限ローテーションパッキング
        function recordRoundScore(score) {
            const roundNum = Math.ceil(totalDartsCount / 3);
            roundScores.push({ num: roundNum, score: score });
            if (roundScores.length > 8) {
                roundScores.shift(); 
            }
            renderScoreGrid();
        }

        function renderScoreGrid() {
            const grid = document.getElementById('scoreGrid');
            if (!grid) return;
            grid.innerHTML = '';
            for (let i = 0; i < 8; i++) {
                const row = document.createElement('div');
                row.className = 'score-row';
                if (roundScores[i]) {
                    let colorStyle = '';
                    const s = roundScores[i].score;
                    if (s >= 100 && s <= 150) {
                        colorStyle = 'color: #ff6600; text-shadow: 0 0 10px rgba(255,102,0,0.4);';
                    } else if (s >= 151 && s <= 180) {
                        colorStyle = 'color: #ffea00; text-shadow: 0 0 10px rgba(255,234,0,0.4);';
                    }
                    row.innerHTML = `<span class="r-num">R${roundScores[i].num}</span><span class="r-val" style="${colorStyle}">${roundScores[i].score}</span>`;
                } else {
                    row.innerHTML = `<span class="r-num">--</span><span class="r-val">---</span>`;
                }
                grid.appendChild(row);
            }
        }
        renderScoreGrid();

        function startGameTimer() {
            if (timerInterval) return;
            document.getElementById('gameTimer').style.display = 'block';
            timerInterval = setInterval(() => {
                totalSeconds++;
                const hrs = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
                const mins = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
                const secs = String(totalSeconds % 60).padStart(2, '0');
                document.getElementById('gameTimer').innerText = `${hrs}:${mins}:${secs}`;
            }, 1000);
        }

        function getColorAtRate(rate) {
            const colors = [
                { p: 0, r: 0, g: 68, b: 255 },     
                { p: 25, r: 153, g: 0, b: 255 },   
                { p: 50, r: 255, g: 0, b: 127 },   
                { p: 75, r: 255, g: 0, b: 0 },     
                { p: 100, r: 255, g: 234, b: 0 }   
            ];
            if (rate <= 0) return 'rgb(0,68,255)';
            if (rate >= 100) return 'rgb(255,234,0)';
            
            let lower = colors[0]; let upper = colors[colors.length - 1];
            for (let i = 0; i < colors.length - 1; i++) {
                if (rate >= colors[i].p && rate <= colors[i+1].p) {
                    lower = colors[i]; upper = colors[i+1]; break;
                }
            }
            const range = upper.p - lower.p;
            const factor = (rate - lower.p) / range;
            const r = Math.round(lower.r + (upper.r - lower.r) * factor);
            const g = Math.round(lower.g + (upper.g - lower.g) * factor);
            const b = Math.round(lower.b + (upper.b - lower.b) * factor);
            return `rgb(${r},${g},${b})`;
        }

        /* 🎯【一芯同期完全連動】中心座標（X:200px, Y:140px[top:0px + 半径140px]）でマスクとピンを100%完全同期 */
        function updateBullRateUI(rate) {
            const gauge = document.getElementById('gaugeCircleCSS');
            const dot = document.getElementById('gaugeDot');
            
            let gradientStr = 'transparent';
            if (rate > 0) {
                const currentSecColor = getColorAtRate(rate);
                if (rate <= 25) {
                    gradientStr = `conic-gradient(#0044ff 0%, ${currentSecColor} ${rate}%, transparent ${rate}%)`;
                } else if (rate <= 50) {
                    gradientStr = `conic-gradient(#0044ff 0%, #9900ff 25%, ${currentSecColor} ${rate}%, transparent ${rate}%)`;
                } else if (rate <= 75) {
                    gradientStr = `conic-gradient(#0044ff 0%, #9900ff 25%, #ff007f 50%, ${currentSecColor} ${rate}%, transparent ${rate}%)`;
                } else {
                    gradientStr = `conic-gradient(#0044ff 0%, #9900ff 25%, #ff007f 50%, #ff0000 75%, ${currentSecColor} ${rate}%, transparent ${rate}%)`;
                }
            }
            if (gauge) gauge.style.background = gradientStr;

            if (rate > 0) {
                if (dot) {
                    dot.style.display = 'block';
                    const angleRad = ((rate * 3.6) - 90) * Math.PI / 180;
                    const r = 132; 
                    const dotX = 200 + r * Math.cos(angleRad); // 横コンテナの中心点200px
                    const dotY = 140 + r * Math.sin(angleRad); // 🎯縦サークル上シフトに伴い中心点140pxへ完全同期修正
                    dot.style.left = `${dotX}px`; dot.style.top = `${dotY}px`;
                    
                    let dotBorderColor = '#0044ff';
                    if (rate > 25) dotBorderColor = '#9900ff';
                    if (rate > 50) dotBorderColor = '#ff007f';
                    if (rate > 75) dotBorderColor = '#ff0000';
                    dot.style.borderColor = dotBorderColor;
                }
            } else {
                if (dot) dot.style.display = 'none';
            }

            const intPart = Math.floor(rate); const decPart = (rate - intPart).toFixed(2).substring(1);
            const rateEl = document.getElementById('bullRate');
            if (rateEl) rateEl.innerHTML = `${intPart}<span>${decPart}%</span>`;
        }

        function calculateScore(id) {
            if (id >= 1 && id <= 20)  return { score: id, label: `S${id}`, type: 'single', num: id };
            if (id >= 21 && id <= 40) return { score: id - 20, label: `S${id - 20}`, type: 'single', num: id - 20 };
            if (id >= 41 && id <= 60) return { score: (id - 40) * 2, label: `D${id - 40}`, type: 'double', num: id - 40 };
            if (id >= 61 && id <= 80) return { score: (id - 60) * 3, label: `T${id - 60}`, type: 'triple', num: id - 60 };
            if (id === 81) return { score: 50, label: 'BULL', type: 'bull', num: 25 };
            if (id === 82) return { score: 50, label: 'D-BULL', type: 'inbull', num: 25 };
            return { score: 0, label: 'MISSED', type: 'unknown', num: 0 };
        }

        function playSound(type) {
            let path = '';
            if (type === 'single') path = 'sounds/single.mp3';
            if (type === 'double') path = 'sounds/double.mp3';
            if (type === 'triple') path = 'sounds/triple.mp3';
            if (type === 'bull') path = 'sounds/bull.mp3';
            if (type === 'inbull') path = 'sounds/inner-bull.mp3';
            if (type === 'round-change') path = 'sounds/round-change.mp3';
            if (type === 'poti') path = 'sounds/poti.mp3';
            if (path) { new Audio(path).play().catch(e => console.log(e)); }
        }

        function playAwardVideo(awardKey) {
            const overlay = document.getElementById('videoOverlay');
            const video = document.getElementById('awardVideo');
            const path = awardVideos[awardKey];

            if (!path) return;

            awardCounts[awardKey]++;
            const el = document.getElementById(`cnt_${awardKey}`);
            if (el) el.innerText = awardCounts[awardKey];

            video.src = path;
            overlay.style.display = 'block';
            currentPlayingVideo = video;
            isVideoPlaying = true;
            video.currentTime = 0;
            
            video.play().catch(e => {
                console.log("Play blocked:", e);
                closeAwardVideo();
            });

            video.onended = () => { closeAwardVideo(); };
        }

        function closeAwardVideo() {
            const overlay = document.getElementById('videoOverlay');
            const video = document.getElementById('awardVideo');
            if (video) {
                video.pause(); video.src = ''; video.load();
            }
            overlay.style.display = 'none';
            currentPlayingVideo = null;
            isVideoPlaying = false;
        }

        function checkRoundAward(hits) {
            if (hits.length === 0) return null; 

            if (hits.length === 3) {
                const isAllInBull = hits.every(h => h.type === 'inbull');
                const isAllBull = hits.every(h => h.type === 'bull' || h.type === 'inbull');
                const isAllTriple = hits.every(h => h.type === 'triple');
                const isAllDouble = hits.every(h => h.type === 'double');

                if (isAllInBull) return 'black';
                if (isAllBull) return 'hattrick';
                if (hits.every(h => h.type === 'triple' && h.num === 20)) return 'ton80';
                if (isAllTriple && (new Set(hits.map(h => h.num)).size === 3)) return 'whitehorse';
                if ((isAllTriple || isAllDouble) && (new Set(hits.map(h => h.num)).size === 1)) return 'bed';
            }

            const roundTotal = hits.reduce((sum, h) => sum + h.score, 0);
            if (roundTotal >= 150 && roundTotal <= 179) return 'highton';
            if (roundTotal >= 100 && roundTotal <= 149) return 'lowton';

            const hasAnyBull = hits.some(h => h.type === 'bull' || h.type === 'inbull');
            if (hasAnyBull) return 'onebull';

            return null;
        }

        document.getElementById('connectBtn').addEventListener('click', () => {
            addLog("SEARCHING BOARD...");

            navigator.bluetooth.requestDevice({
                filters: [
                    { name: 'DARTSLIVE HOME' }, { name: 'DARTSLIVE Home' }, { name: 'dartslive home' },
                    { namePrefix: 'DARTSLIVE' }, { namePrefix: 'DartsLive' }, { namePrefix: 'dartslive' }
                ],
                optionalServices: [SERVICE_UUID]
            })
            .then(async (device) => {
                addLog("CONNECTING...");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristics = await service.getCharacteristics();
                
                let targetCharacteristic = null;
                for (const c of characteristics) {
                    if (c.properties.notify) { targetCharacteristic = c; break; }
                }
                if (!targetCharacteristic) throw new Error("NO NOTIFY CHARACTERISTIC");

                await targetCharacteristic.startNotifications();
                targetCharacteristic.addEventListener('characteristicvaluechanged', handleDataChanged);
                
                addLog("CONNECTED.");
                document.getElementById('connectBtn').style.display = 'none';

                const startOverlay = document.getElementById('startOverlay');
                startOverlay.style.display = 'flex';

                startOverlay.onclick = () => {
                    playSound('round-change');
                    
                    const v = document.getElementById('awardVideo');
                    if (v) {
                        v.play().then(() => { v.pause(); v.currentTime = 0; }).catch(e => console.log(e));
                    }

                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(e => console.log(e));
                    }

                    startOverlay.style.display = 'none';
                    addLog("ALL SYSTEMS OPERATIONAL. READY!");
                };
            })
            .catch(error => {
                addLog(`ERROR: ${error.message}`);
            });
        });

        function handleDataChanged(event) {
            if (isRoundLock) return;

            const data = event.target.value;
            if (data.byteLength >= 3 && data.getUint8(0) === 0xA1 && data.getUint8(1) === 0x03) {
                if (isVideoPlaying) { closeAwardVideo(); }

                const segmentId = data.getUint8(2);

                if (segmentId === 0x54) {
                    isRoundLock = true; 
                    
                    const roundTotal = roundHits.reduce((sum, h) => sum + h.score, 0);
                    recordRoundScore(roundTotal);

                    const award = checkRoundAward(roundHits);
                    setTimeout(() => {
                        if (award) { 
                            playAwardVideo(award); 
                        } else { 
                            playSound('round-change'); 
                        }
                    }, 600); 

                    if (totalDartsCount % 3 !== 0) {
                        totalDartsCount = Math.ceil(totalDartsCount / 3) * 3;
                    } else if (roundHits.length === 0) {
                        totalDartsCount += 3; 
                    }

                    setTimeout(() => {
                        isRoundLock = false;
                        roundHits = [];
                        document.getElementById('slot0').innerText = '---';
                        document.getElementById('slot1').innerText = '---';
                        document.getElementById('slot2').innerText = '---';
                        document.getElementById('currentRoundNum').innerText = (totalDartsCount / 3) + 1;
                    }, 6000);
                    
                    return; 
                }

                if (roundHits.length === 3) {
                    roundHits = [];
                    document.getElementById('slot0').innerText = '---';
                    document.getElementById('slot1').innerText = '---';
                    document.getElementById('slot2').innerText = '---';
                }

                const result = calculateScore(segmentId);

                if (result.score >= 0) {
                    if (totalDartsCount === 0) {
                        startGameTimer();
                    }

                    totalScore += result.score;
                    totalDartsCount++;
                    
                    const isBullHit = (result.type === 'bull' || result.type === 'inbull');
                    if (isBullHit) {
                        totalBullCount++;
                        if (result.type === 'inbull') {
                            totalInnerBullCount++;
                        } else {
                            totalOuterBullCount++;
                        }
                    }

                    roundHits.push(result);
                    const currentSlotIndex = roundHits.length - 1;

                    document.getElementById('totalScore').innerText = totalScore;
                    
                    document.getElementById('bullCount').innerText = totalBullCount;
                    document.getElementById('innerBullCount').innerText = totalInnerBullCount;
                    document.getElementById('outerBullCount').innerText = totalOuterBullCount;
                    
                    document.getElementById(`slot${currentSlotIndex}`).innerText = result.label;
                    document.getElementById('currentRoundNum').innerText = Math.ceil(totalDartsCount / 3);

                    const currentRate = (totalBullCount / totalDartsCount) * 100;
                    updateBullRateUI(currentRate);

                    playSound(result.type);

                    if (roundHits.length === 3) {
                        isRoundLock = true; 
                        
                        const roundTotal = roundHits.reduce((sum, h) => sum + h.score, 0);
                        recordRoundScore(roundTotal);

                        const award = checkRoundAward(roundHits);
                        setTimeout(() => {
                            if (award) { 
                                playAwardVideo(award); 
                            } else { 
                                playSound('round-change'); 
                            }
                        }, 600); 

                        setTimeout(() => {
                            isRoundLock = false;
                        }, 6000);
                    }
                }
            }
        }

        function addLog(text) {
            const consoleLog = document.getElementById('logConsole');
            const controlsHeader = document.querySelector('.header-controls');
            
            consoleLog.style.transition = 'none';
            consoleLog.style.opacity = '1';
            if (controlsHeader) {
                controlsHeader.style.transition = 'none';
                controlsHeader.style.opacity = '1';
                controlsHeader.style.display = 'flex';
            }

            consoleLog.innerText = text;

            if (logTimeout) clearTimeout(logTimeout);
            if (headerTimeout) clearTimeout(headerTimeout);

            logTimeout = setTimeout(() => {
                consoleLog.style.transition = 'opacity 1s ease';
                consoleLog.style.opacity = '0';
            }, 5000);

            if (text === "CONNECTED." || text.includes("READY")) {
                headerTimeout = setTimeout(() => {
                    if (controlsHeader) {
                        controlsHeader.style.transition = 'opacity 1s ease';
                        controlsHeader.style.opacity = '0';
                        setTimeout(() => { controlsHeader.style.display = 'none'; }, 1000);
                    }
                }, 5000);
            }
        }
    </script>
</body>
