<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無限カウントアップ - DARTSLIVE Home</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }
        h1 { color: #00adb5; font-size: 2rem; margin-bottom: 30px; }
        .score-display {
            font-size: 8rem;
            font-weight: bold;
            color: #393e46;
            background: #222831;
            padding: 20px;
            border-radius: 20px;
            display: inline-block;
            min-width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            transition: color 0.1s ease;
        }
        .score-display.hit { color: #00adb5; }
        .stats { font-size: 1.5rem; color: #eeeeee; margin-bottom: 40px; }
        .btn {
            background-color: #00adb5;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,173,181,0.4);
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn:hover { background-color: #008c92; transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); }
        .log { max-width: 400px; margin: 30px auto 0; text-align: left; color: #888; font-size: 0.9rem; word-break: break-all; }
    </style>
</head>
<body>

    <h1>DARTSLIVE Home<br>✨ 無限カウントアップ ✨</h1>

    <div class="score-display" id="totalScore">0</div>

    <div class="stats">
        <span id="dartsCount">0</span> 投目 （今回: <span id="lastHit">--</span>）
    </div>

    <button class="btn" id="connectBtn">ボードに接続する</button>

    <div class="log" id="logConsole"></div>

    <script>
        // サービスのUUID（大きな箱）はこれで確定
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';

        let totalScore = 0;
        let dartsCount = 0;

        function calculateScore(id) {
            if (id >= 1 && id <= 20) return { score: id, label: `S${id}` };
            if (id >= 21 && id <= 40) return { score: id - 20, label: `S${id - 20}` };
            if (id >= 41 && id <= 60) return { score: (id - 40) * 2, label: `D${id - 40}` };
            if (id >= 61 && id <= 80) return { score: (id - 60) * 3, label: `T${id - 60}` };
            if (id === 81) return { score: 50, label: 'Outer Bull' };
            if (id === 82) return { score: 50, label: 'Inner Bull' };
            return { score: 0, label: 'Unknown' };
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            addLog("デバイスを検索中...");
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ name: 'DARTSLIVE HOME' }],
                    optionalServices: [SERVICE_UUID]
                });

                addLog(`${device.name} に接続中...`);
                const server = await device.gatt.connect();

                addLog("サービスを取得中...");
                const service = await server.getPrimaryService(SERVICE_UUID);

                addLog("キャラクタリスティック（引き出し）を自動スキャン中...");
                // 【変更点】サービス内のすべての引き出しを一度全取得する
                const characteristics = await service.getCharacteristics();
                
                let targetCharacteristic = null;
                
                // ループで1つずつ中身をチェック
                for (const c of characteristics) {
                    addLog(`発見: ...${c.uuid.substring(0,8)} (Notify:${c.properties.notify})`);
                    
                    // Notify（データが飛んでくる設定）ができる引き出しを自動キープ
                    if (c.properties.notify) {
                        targetCharacteristic = c;
                        break;
                    }
                }

                if (!targetCharacteristic) {
                    throw new Error("Notify対応の引き出しが見つかりませんでした。");
                }

                addLog(`ターゲット決定: ...${targetCharacteristic.uuid.substring(0,8)}`);
                
                // 通知の開始
                await targetCharacteristic.startNotifications();
                targetCharacteristic.addEventListener('characteristicvaluechanged', handleDataChanged);

                addLog("接続成功！ダーツを投げてください。");
                document.getElementById('connectBtn').style.display = 'none';

            } catch (error) {
                addLog(`エラー: ${error.message}`);
                console.error(error);
            }
        });

        function handleDataChanged(event) {
            const data = event.target.value;
            
            if (data.byteLength >= 3 && data.getUint8(0) === 0xA1 && data.getUint8(1) === 0x03) {
                const segmentId = data.getUint8(2);
                const result = calculateScore(segmentId);

                if (result.score > 0) {
                    totalScore += result.score;
                    dartsCount += 1;

                    document.getElementById('totalScore').innerText = totalScore;
                    document.getElementById('dartsCount').innerText = dartsCount;
                    document.getElementById('lastHit').innerText = `${result.label} (+${result.score})`;

                    const scoreEl = document.getElementById('totalScore');
                    scoreEl.classList.add('hit');
                    setTimeout(() => scoreEl.classList.remove('hit'), 150);
                }
            }
        }

        function addLog(text) {
            const consoleEl = document.getElementById('logConsole');
            consoleEl.innerHTML = text + "<br>" + consoleEl.innerHTML;
        }
    </script>
</body>
</html>
