<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DARTSLIVE Home - Premium 1080p Interface</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00adb5;
            --bg-translucent: rgba(255, 255, 255, 0.12); /* カンプの美しい透過 */
            --panel-bg: rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Oswald', 'Helvetica Neue', Arial, sans-serif;
            background-color: #121212;
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* 1920*1080 固定の仮想キャンバス（どの端末から出力しても16:9を完全維持） */
        #app-scaler {
            width: 1920px;
            height: 1080px;
            background-image: url('bg.png');
            background-size: cover;
            background-position: center;
            color: #ffffff;
            display: flex;
            position: absolute;
            transform-origin: center center;
            box-sizing: border-box;
            padding: 90px 80px 80px 80px;
            gap: 80px;
        }

        /* 左カラム：スコア・ラウンド・履歴 */
        .left-column {
            flex: 1.3;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        /* 右カラム：スタッツ・アワード（透過パネル） */
        .right-column {
            flex: 0.85;
            background: var(--bg-translucent);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            padding: 60px;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 255, 255, 0.15);
            position: relative;
            height: 100%;
            box-sizing: border-box;
            z-index: 5;
        }

        /* 上部ラウンド表示 */
        .round-badge {
            background: var(--panel-bg);
            border-radius: 100px;
            padding: 15px 70px;
            font-size: 3.5rem;
            font-weight: 700;
            font-family: 'Impact', 'Arial Black', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            letter-spacing: 2px;
            align-self: flex-start;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
        }
        .round-badge .infinity { font-size: 4.5rem; line-height: 0; }
        .round-badge .label { font-size: 2.2rem; color: #aaa; font-weight: 400; margin-left: 15px; font-family: 'Oswald', sans-serif; }

        /* メイン巨大スコア */
        .huge-score {
            font-size: 28rem; 
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 900;
            line-height: 0.8;
            text-shadow: 0 20px 50px rgba(0, 0, 0, 0.85), 0 40px 80px rgba(0, 0, 0, 0.7);
            letter-spacing: -6px;
            text-align: left;
            margin: auto 0;
            padding-left: 10px;
        }

        /* 3本履歴カプセル */
        .history-capsule {
            background: var(--panel-bg);
            border-radius: 100px;
            padding: 25px 70px;
            display: flex;
            justify-content: flex-start;
            gap: 50px;
            font-size: 3.2rem;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-weight: 700;
            color: #eee;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            margin-top: auto;
            align-self: flex-start;
        }
        .history-capsule div { min-width: 160px; text-align: left; }
        .history-capsule .separator { color: #444; font-weight: 400; min-width: auto; font-family: 'Oswald', sans-serif; }

        /* 🔥【修正】右側タブシステム（パネル枠線と1px重ね、z-indexで潜り込ませることで重なり白浮きを完全消滅） */
        .tab-header {
            display: flex;
            position: absolute;
            bottom: 100%; /* パネルの真上に配置 */
            left: 50px;    /* カンプ通りの左上の位置 */
            margin-bottom: -1px; /* 右パネルの枠線（1px）とピッタリ重ねる */
            z-index: 10;
        }
        .tab-btn {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom: none;
            color: #666;
            padding: 12px 55px;
            font-size: 2rem;
            font-family: inherit;
            border-radius: 20px 20px 0 0;
            cursor: pointer;
            font-weight: 700;
            white-space: nowrap;
            flex-shrink: 0;
            margin-right: -1px; /* タブ同士の境界線を重ねて太くなるのを防ぐ */
            z-index: 1; /* 通常時は枠線の下に潜らせる */
            transition: all 0.15s ease;
        }
        .tab-btn.active {
            background: var(--bg-translucent);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-bottom: none;
            z-index: 12; /* 🔥枠線より「上」に重ねることで、下のパネル線を物理的に消し去り完全一体化 */
        }

        /* ブル率表示エリア */
        .bull-rate-container {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            width: 500px;
            height: 500px;
            margin: 0 auto;
        }
        
        /* 🔥 円周グラデーション用ベーストラック */
        .gauge-track-css {
            position: absolute;
            width: 360px;
            height: 360px;
            border: 16px solid rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            box-sizing: border-box;
        }
        .gauge-progress-css {
            position: absolute;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: transparent;
            box-sizing: border-box;
            -webkit-mask: radial-gradient(transparent 164px, #000 165px);
            mask: radial-gradient(transparent 164px, #000 165px);
            /* 回転・反転を一切排除。12時から時計回りに素直に描画 */
        }

        /* グラデーションの先端を追従する白いドットピン */
        .gauge-dot {
            position: absolute;
            width: 26px;
            height: 26px;
            background: #ffffff;
            border: 5px solid #0044ff;
            border-radius: 50%;
            box-sizing: border-box;
            box-shadow: 0 0 15px rgba(255,255,255,0.8), 0 5px 10px rgba(0,0,0,0.5);
            display: none;
            z-index: 100;
            transform: translate(-13px, -13px);
            pointer-events: none;
        }

        /* ゲージ中央のテキスト */
        .gauge-text { position: absolute; text-align: center; background: transparent; z-index: 10; }
        .gauge-text .label { font-size: 2rem; color: #aaa; letter-spacing: 4px; margin-bottom: 5px; font-weight: 700; }
        .gauge-text .percent { font-size: 9rem; font-family: 'Impact', sans-serif; font-weight: 700; line-height: 1; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .gauge-text .percent span { font-size: 3.8rem; font-weight: 400; }

        /* 弧状レベルメーター */
        .level-meter-deco { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .level-bar { position: absolute; width: 32px; height: 8px; background: rgba(255,255,255,0.08); border-radius: 2px; transform-origin: center center; }

        /* BULL COUNT表示 */
        .bull-count-box { text-align: center; margin-top: 0px; }
        .bull-count-box .label { font-size: 2.5rem; letter-spacing: 6px; color: #aaa; margin-bottom: 0px; font-weight: 700; }
        .bull-count-box .count { font-size: 13rem; font-family: 'Impact', sans-serif; font-weight: 700; line-height: 1; text-shadow: 0 15px 30px rgba(0,0,0,0.5); }

        /* アワード数表示エリア */
        .award-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: 100%;
            align-content: space-around;
            padding: 20px 0;
            box-sizing: border-box;
        }
        .award-item { text-align: center; }
        .award-item .label { font-size: 1.8rem; color: #999; letter-spacing: 2px; margin-bottom: 5px; font-weight: 700; }
        .award-item .count { font-size: 7rem; font-family: 'Impact', sans-serif; font-weight: 700; color: #fff; line-height: 1; text-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        /* 接続ボタン＆ログ */
        .header-controls { position: absolute; top: 25px; left: 35px; display: flex; align-items: center; gap: 20px; z-index: 10000; }
        .btn-connect {
            background: #00adb5; border: none; color: white; padding: 12px 35px;
            font-family: inherit; font-size: 1.4rem; font-weight: 700; border-radius: 30px; cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,173,181,0.4);
        }
        .dev-log { color: #666; font-size: 1.2rem; font-family: monospace; }

        /* 全画面ビデオオーバーレイ */
        #videoOverlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.95); z-index: 99999; }
        #videoOverlay video { width: 100%; height: 100%; object-fit: contain; display: none; }

        /* 接続完了後の演出用スタートスクリーン */
        #startOverlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.85); z-index: 99998;
            flex-direction: column; align-items: center; justify-content: center; cursor: pointer;
        }
        #startOverlay .msg-main {
            font-size: 5.5rem; font-weight: 700; color: #00adb5; font-family: 'Impact', sans-serif;
            letter-spacing: 6px; text-shadow: 0 0 25px #00adb5; animation: blink 1.5s infinite;
        }
        #startOverlay .msg-sub { font-size: 1.5rem; color: #aaa; margin-top: 20px; letter-spacing: 2px; }

        @keyframes blink {
            0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>

    <div class="header-controls">
        <button class="btn-connect" id="connectBtn">CONNECT BOARD</button>
        <div class="dev-log" id="logConsole">BOARD READY.</div>
    </div>

    <div id="app-scaler">
        <div class="left-column">
            <div class="round-badge">
                <span id="currentRoundNum">1</span> <span style="color:#555;">/</span> <span class="infinity">∞</span> <span class="label">ROUND</span>
            </div>
            <div class="huge-score" id="totalScore">0</div>
            <div class="history-capsule">
                <div id="slot0">---</div>
                <div class="separator">|</div>
                <div id="slot1">---</div>
                <div class="separator">|</div>
                <div id="slot2">---</div>
            </div>
        </div>

        <div class="right-column">
            <div class="tab-header">
                <button class="tab-btn active" id="btnTabBull">ブル率</button>
                <button class="tab-btn" id="btnTabAward">アワード数</button>
            </div>

            <div class="tab-content active" id="contentBull">
                <div class="bull-rate-container">
                    <div class="level-meter-deco" id="levelMeter"></div>
                    
                    <div class="gauge-track-css"></div>
                    <div class="gauge-progress-css" id="gaugeCircleCSS"></div>
                    <div class="gauge-dot" id="gaugeDot"></div>
                    
                    <div class="gauge-text">
                        <div class="label">BULL RATE</div>
                        <div class="percent" id="bullRate">0<span>.00%</span></div>
                    </div>
                </div>
                <div class="bull-count-box">
                    <div class="label">BULL COUNT</div>
                    <div class="count" id="bullCount">0</div>
                </div>
            </div>

            <div class="tab-content" id="contentAward">
                <div class="award-grid">
                    <div class="award-item"><div class="label">ONE BULL</div><div class="count" id="cnt_onebull">0</div></div>
                    <div class="award-item"><div class="label">LOW TON</div><div class="count" id="cnt_lowton">0</div></div>
                    <div class="award-item"><div class="label">HAT TRICK</div><div class="count" id="cnt_hattrick">0</div></div>
                    <div class="award-item"><div class="label">HIGH TON</div><div class="count" id="cnt_highton">0</div></div>
                    <div class="award-item"><div class="label">TON 80</div><div class="count" id="cnt_ton80">0</div></div>
                    <div class="award-item"><div class="label">WHITE HORSE</div><div class="count" id="cnt_whitehorse">0</div></div>
                    <div class="award-item"><div class="label">THREE IN A BED</div><div class="count" id="cnt_bed">0</div></div>
                    <div class="award-item"><div class="label">THREE IN THE BLACK</div><div class="count" id="cnt_black">0</div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="videoOverlay">
        <video id="video_onebull" src="videos/onebull.mp4" preload="auto" playsinline webkit-playsinline></video>
        <video id="video_lowton" src="videos/lowton.mp4" preload="auto" playsinline webkit-playsinline></video>
        <video id="video_highton" src="videos/highton.mp4" preload="auto" playsinline webkit-playsinline></video>
        <video id="video_ton80" src="videos/ton80.mp4" preload="auto" playsinline webkit-playsinline></video>
        <video id="video_hattrick" src="videos/hattrick.mp4" preload="auto" playsinline webkit-playsinline></video>
        <video id="video_bed" src="videos/three-in-a-bed.mp4" preload="auto" playsinline webkit-playsinline></video>
        <video id="video_whitehorse" src="videos/white-horse.mp4" preload="auto" playsinline webkit-playsinline></video>
        <video id="video_black" src="videos/three-in-the-black.mp4" preload="auto" playsinline webkit-playsinline></video>
    </div>

    <div id="startOverlay">
        <div class="msg-main">TAP TO START</div>
        <div class="msg-sub">BOARD CONNECTED. TAP TO UNLOCK SYSTEM MEDIA.</div>
    </div>

    <script>
        const SERVICE_UUID = '6e400001-b5a3-f393-e0a9-e50e24dcca9e';
        const awardKeys = ['onebull', 'lowton', 'highton', 'ton80', 'hattrick', 'bed', 'whitehorse', 'black'];
        
        let totalScore = 0;
        let totalDartsCount = 0;
        let totalBullCount = 0;
        let roundHits = []; 
        let isVideoPlaying = false;
        let currentPlayingVideo = null;

        const awardCounts = { onebull: 0, lowton: 0, highton: 0, ton80: 0, hattrick: 0, bed: 0, whitehorse: 0, black: 0 };

        function resizeApp() {
            const scaler = document.getElementById('app-scaler');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            scaler.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', resizeApp);
        window.addEventListener('DOMContentLoaded', resizeApp);

        // イコライザーの弧の配置座標
        const levelMeter = document.getElementById('levelMeter');
        const totalBars = 18;
        const radius = 248; 
        const centerX = 250; 
        const centerY = 250;

        for(let i=0; i<totalBars; i++) {
            const bar = document.createElement('div');
            bar.className = 'level-bar';
            const startAngle = 110; const endAngle = 250;
            const angleDeg = startAngle + ((endAngle - startAngle) / (totalBars - 1)) * i;
            const angleRad = (angleDeg * Math.PI) / 180;
            const x = centerX + radius * Math.cos(angleRad) - 16;
            const y = centerY * radius * Math.sin(angleRad) - 4;
            bar.style.left = `${x}px`; bar.style.top = `${y}px`; bar.style.transform = `rotate(${angleDeg}deg)`;
            levelMeter.appendChild(bar);
        }

        // タブ切り替え
        const btnTabBull = document.getElementById('btnTabBull');
        const btnTabAward = document.getElementById('btnTabAward');
        const contentBull = document.getElementById('contentBull');
        const contentAward = document.getElementById('contentAward');

        btnTabBull.addEventListener('click', () => {
            playSound('poti');
            btnTabBull.classList.add('active'); btnTabAward.classList.remove('active');
            contentBull.classList.add('active'); contentAward.classList.remove('active');
        });
        btnTabAward.addEventListener('click', () => {
            playSound('poti');
            btnTabAward.classList.add('active'); btnTabBull.classList.remove('active');
            contentAward.classList.add('active'); contentBull.classList.remove('active');
        });

        // 🔥【新設】円周に沿ったピッチを崩さずに、現在の進捗度（rate）でパチッと透明に切るための補間計算
        function getColorAtRate(rate) {
            const colors = [
                { p: 0, r: 0, g: 68, b: 255 },      // 0%: 青 (#0044ff)
                { p: 25, r: 153, g: 0, b: 255 },   // 25%: 紫 (#9900ff)
                { p: 50, r: 255, g: 0, b: 127 },   // 50%: チェリーマゼンタ (#ff007f)
                { p: 75, r: 255, g: 0, b: 0 },     // 75%: 赤 (#ff0000)
                { p: 100, r: 255, g: 234, b: 0 }   // 100%: 黄色 (#ffea00)
            ];
            if (rate <= 0) return 'rgb(0,68,255)';
            if (rate >= 100) return 'rgb(255,234,0)';
            
            let lower = colors[0];
            let upper = colors[colors.length - 1];
            for (let i = 0; i < colors.length - 1; i++) {
                if (rate >= colors[i].p && rate <= colors[i+1].p) {
                    lower = colors[i];
                    upper = colors[i+1];
                    break;
                }
            }
            const range = upper.p - lower.p;
            const factor = (rate - lower.p) / range;
            const r = Math.round(lower.r + (upper.r - lower.r) * factor);
            const g = Math.round(lower.g + (upper.g - lower.g) * factor);
            const b = Math.round(lower.b + (upper.b - lower.b) * factor);
            return `rgb(${r},${g},${b})`;
        }

        // 🔥【修正】12時を0%（青）起点とし、時計回りに無段階で伸びるコニックグラデーション制御
        function updateBullRateUI(rate) {
            const gauge = document.getElementById('gaugeCircleCSS');
            const dot = document.getElementById('gaugeDot');
            
            let gradientStr = 'transparent';
            if (rate > 0) {
                const currentSecColor = getColorAtRate(rate);
                if (rate <= 25) {
                    gradientStr = `conic-gradient(#0044ff 0%, ${currentSecColor} ${rate}%, transparent ${rate}%)`;
                } else if (rate <= 50) {
                    gradientStr = `conic-gradient(#0044ff 0%, #9900ff 25%, ${currentSecColor} ${rate}%, transparent ${rate}%)`;
                } else if (rate <= 75) {
                    gradientStr = `conic-gradient(#0044ff 0%, #9900ff 25%, #ff007f 50%, ${currentSecColor} ${rate}%, transparent ${rate}%)`;
                } else {
                    gradientStr = `conic-gradient(#0044ff 0%, #9900ff 25%, #ff007f 50%, #ff0000 75%, ${currentSecColor} ${rate}%, transparent ${rate}%)`;
                }
            }
            gauge.style.background = gradientStr;

            // 🔥 先端の白いドットピンの軌道を12時（真上）起点に100%シンクロ
            if (rate > 0) {
                dot.style.display = 'block';
                const angleRad = ((rate * 3.6) - 90) * Math.PI / 180; // 12時（真上）が -90度
                const r = 172; // ドーナツの真ん中を通る物理半径
                const dotX = 250 + r * Math.cos(angleRad);
                const dotY = 250 + r * Math.sin(angleRad);
                dot.style.left = `${dotX}px`;
                dot.style.top = `${dotY}px`;
                
                // ピンのフチの色もグラデーション先端色と自動シンクロ
                let dotBorderColor = '#0044ff';
                if (rate > 25) dotBorderColor = '#9900ff';
                if (rate > 50) dotBorderColor = '#ff007f';
                if (rate > 75) dotBorderColor = '#ff0000';
                dot.style.borderColor = dotBorderColor;
            } else {
                dot.style.display = 'none';
            }

            // 中央テキスト更新
            const intPart = Math.floor(rate);
            const decPart = (rate - intPart).toFixed(2).substring(1);
            document.getElementById('bullRate').innerHTML = `${intPart}<span>${decPart}%</span>`;

            // 弧状レベルメーターの連動発光も時計回りのカラーピッチに完全シンクロ
            const bars = document.querySelectorAll('.level-bar');
            const activeBarsCount = Math.ceil((rate / 100) * bars.length);
            bars.forEach((bar, idx) => {
                if(idx < activeBarsCount) {
                    const ratio = idx / bars.length;
                    let barColor = '#0044ff';
                    if (ratio >= 0.25) barColor = '#9900ff';
                    if (ratio >= 0.50) barColor = '#ff007f';
                    if (ratio >= 0.75) barColor = '#ff0000';
                    
                    bar.style.background = barColor;
                    bar.style.boxShadow = `0 0 12px ${barColor}`;
                } else {
                    bar.style.background = 'rgba(255,255,255,0.08)';
                    bar.style.boxShadow = 'none';
                }
            });
        }

        function calculateScore(id) {
            if (id >= 1 && id <= 20)  return { score: id, label: `S${id}`, type: 'single', num: id };
            if (id >= 21 && id <= 40) return { score: id - 20, label: `S${id - 20}`, type: 'single', num: id - 20 };
            if (id >= 41 && id <= 60) return { score: (id - 40) * 2, label: `D${id - 40}`, type: 'double', num: id - 40 };
            if (id >= 61 && id <= 80) return { score: (id - 60) * 3, label: `T${id - 60}`, type: 'triple', num: id - 60 };
            if (id === 81) return { score: 50, label: 'BULL', type: 'bull', num: 25 };
            if (id === 82) return { score: 50, label: 'D-BULL', type: 'inbull', num: 25 };
            return { score: 0, label: 'MISSED', type: 'unknown', num: 0 };
        }

        function playSound(type) {
            let path = '';
            if (type === 'single') path = 'sounds/single.mp3';
            if (type === 'double') path = 'sounds/double.mp3';
            if (type === 'triple') path = 'sounds/triple.mp3';
            if (type === 'bull') path = 'sounds/bull.mp3';
            if (type === 'inbull') path = 'sounds/inner-bull.mp3';
            if (type === 'round-change') path = 'sounds/round-change.mp3';
            if (type === 'poti') path = 'sounds/poti.mp3';

            if (path) { new Audio(path).play().catch(e => console.log(e)); }
        }

        function playAwardVideo(awardKey) {
            const overlay = document.getElementById('videoOverlay');
            const video = document.getElementById(`video_${awardKey}`);

            if (!video) return;

            awardCounts[awardKey]++;
            document.getElementById(`cnt_${awardKey}`).innerText = awardCounts[awardKey];

            overlay.style.display = 'block';
            video.style.display = 'block';
            currentPlayingVideo = video;
            isVideoPlaying = true;
            video.currentTime = 0;
            
            video.play().catch(e => {
                console.log("Play blocked:", e);
                closeAwardVideo();
            });

            video.onended = () => { closeAwardVideo(); };
        }

        function closeAwardVideo() {
            const overlay = document.getElementById('videoOverlay');
            if (currentPlayingVideo) {
                currentPlayingVideo.pause();
                currentPlayingVideo.style.display = 'none';
                currentPlayingVideo.currentTime = 0;
                currentPlayingVideo = null;
            }
            overlay.style.display = 'none';
            isVideoPlaying = false;
        }

        // 3投終了時の一括アワード判定
        function checkRoundAward(hits) {
            const isAllInBull = hits.every(h => h.type === 'inbull');
            const isAllBull = hits.every(h => h.type === 'bull' || h.type === 'inbull');
            const isAllTriple = hits.every(h => h.type === 'triple');
            const isAllDouble = hits.every(h => h.type === 'double');

            if (isAllInBull) return 'black';
            if (isAllBull) return 'hattrick';
            if (hits.every(h => h.type === 'triple' && h.num === 20)) return 'ton80';
            if (isAllTriple && (new Set(hits.map(h => h.num)).size === 3)) return 'whitehorse';
            if ((isAllTriple || isAllDouble) && (new Set(hits.map(h => h.num)).size === 1)) return 'bed';

            const roundTotal = hits.reduce((sum, h) => sum + h.score, 0);
            if (roundTotal >= 150 && roundTotal <= 179) return 'highton';
            if (roundTotal >= 100 && roundTotal <= 149) return 'lowton';

            const hasAnyBull = hits.some(h => h.type === 'bull' || h.type === 'inbull');
            if (hasAnyBull) return 'onebull';

            return null;
        }

        // Bluetooth接続（最優先実行構造）
        document.getElementById('connectBtn').addEventListener('click', () => {
            addLog("SEARCHING BOARD...");

            navigator.bluetooth.requestDevice({
                filters: [{ name: 'DARTSLIVE HOME' }],
                optionalServices: [SERVICE_UUID]
            })
            .then(async (device) => {
                addLog("CONNECTING...");
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const characteristics = await service.getCharacteristics();
                
                let targetCharacteristic = null;
                for (const c of characteristics) {
                    if (c.properties.notify) { targetCharacteristic = c; break; }
                }
                if (!targetCharacteristic) throw new Error("NO NOTIFY CHARACTERISTIC");

                await targetCharacteristic.startNotifications();
                targetCharacteristic.addEventListener('characteristicvaluechanged', handleDataChanged);
                
                addLog("CONNECTED.");
                document.getElementById('connectBtn').style.display = 'none';

                // 接続成功後、全画面の「TAP TO START」スクリーンを起動
                const startOverlay = document.getElementById('startOverlay');
                startOverlay.style.display = 'flex';

                startOverlay.onclick = () => {
                    playSound('round-change');
                    
                    // Android対応ブラウザならフルスクリーン化
                    if (document.documentElement.requestFullscreen) {
                        document.documentElement.requestFullscreen().catch(e => console.log(e));
                    }

                    // 8つのアワード動画を一斉アンロック
                    awardKeys.forEach(key => {
                        const v = document.getElementById(`video_${key}`);
                        if (v) {
                            v.play().then(() => {
                                v.pause();
                                v.currentTime = 0;
                            }).catch(e => console.log(`${key} unlock error:`, e));
                        }
                    });

                    startOverlay.style.display = 'none';
                    addLog("ALL SYSTEMS OPERATIONAL. READY!");
                };
            })
            .catch(error => {
                addLog(`ERROR: ${error.message}`);
            });
        });

        function handleDataChanged(event) {
            const data = event.target.value;
            if (data.byteLength >= 3 && data.getUint8(0) === 0xA1 && data.getUint8(1) === 0x03) {
                if (isVideoPlaying) { closeAwardVideo(); }

                if (roundHits.length === 3) {
                    roundHits = [];
                    document.getElementById('slot0').innerText = '---';
                    document.getElementById('slot1').innerText = '---';
                    document.getElementById('slot2').innerText = '---';
                }

                const segmentId = data.getUint8(2);
                const result = calculateScore(segmentId);

                if (result.score >= 0) {
                    totalScore += result.score;
                    totalDartsCount++;
                    const isBullHit = (result.type === 'bull' || result.type === 'inbull');
                    if (isBullHit) totalBullCount++;

                    roundHits.push(result);
                    const currentSlotIndex = roundHits.length - 1;

                    document.getElementById('totalScore').innerText = totalScore;
                    document.getElementById('bullCount').innerText = totalBullCount;
                    document.getElementById(`slot${currentSlotIndex}`).innerText = result.label;
                    document.getElementById('currentRoundNum').innerText = Math.ceil(totalDartsCount / 3);

                    const currentRate = (totalBullCount / totalDartsCount) * 100;
                    updateBullRateUI(currentRate);

                    playSound(result.type);

                    // 🎯 3投終了した瞬間にアワードを1つだけ再生
                    if (roundHits.length === 3) {
                        const award = checkRoundAward(roundHits);
                        setTimeout(() => {
                            if (award) { 
                                playAwardVideo(award); 
                            } else { 
                                playSound('round-change'); 
                            }
                        }, 600); 
                    }
                }
            }
        }

        function addLog(text) { document.getElementById('logConsole').innerText = text; }
    </script>
</body>
</html>
